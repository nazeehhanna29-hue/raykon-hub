<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lop Side - 3D Printing Shop</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; text-align: center; margin: 0; padding: 20px; color: #333; }
        .header { background: linear-gradient(135deg, #1a1a1a, #444); color: white; padding: 30px; border-radius: 15px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .header img { max-width: 120px; border-radius: 50%; border: 3px solid #fff; margin-bottom: 10px; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: auto; }
        .product-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 6px 12px rgba(0,0,0,0.08); transition: transform 0.3s; }
        .product-card:hover { transform: translateY(-5px); }
        .product-card img { width: 100%; height: 220px; object-fit: cover; border-radius: 10px; }
        .product-card h3 { margin: 15px 0 5px; font-size: 1.4em; }
        .price { font-weight: bold; color: #e67e22; font-size: 1.3em; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ddd; background: #fafafa; cursor: pointer; }
        button { background-color: #25d366; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 1.1em; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #128c7e; }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.png" alt="Lop Side Logo">
        <h1>Lop Side Shop</h1>
        <p>اطلب مجسمك الـ 3D المفضل الآن!</p>
    </div>

    <div class="container">

        <div class="product-card">
            <img src="carrot-bookmark.jpg" alt="Carrot Bookmark">
            <h3>Carrot Bookmark</h3>
            <div class="price">10 شيكل</div>
            <label>اختر اللون:</label>
            <select class="color-select">
                <option value="أزرق">أزرق</option>
                <option value="أحمر">أحمر</option>
                <option value="أسود">أسود</option>
            </select>
            <button onclick="order('Carrot Bookmark', this)">اطلب عبر واتساب</button>
        </div>

        <div class="product-card">
            <img src="comb.jpg" alt="Comb">
            <h3>Comb</h3>
            <div class="price">15 شيكل</div>
            <label>اختر اللون:</label>
            <select class="color-select">
                <option value="أزرق">أزرق</option>
                <option value="أحمر">أحمر</option>
                <option value="أسود">أسود</option>
            </select>
            <button onclick="order('Comb', this)">اطلب عبر واتساب</button>
        </div>

        <div class="product-card">
            <img src="dinosaur-bookmark.jpg" alt="Dinosaur Bookmark">
            <h3>Dinosaur Bookmark</h3>
            <div class="price">10 شيكل</div>
            <label>اختر اللون:</label>
            <select class="color-select">
                <option value="أزرق">أزرق</option>
                <option value="أحمر">أحمر</option>
                <option value="أسود">أسود</option>
            </select>
            <button onclick="order('Dinosaur Bookmark', this)">اطلب عبر واتساب</button>
        </div>

        <div class="product-card">
            <img src="ghost-bookmark.jpg" alt="Ghost Bookmark">
            <h3>Ghost Bookmark</h3>
            <div class="price">10 شيكل</div>
            <label>اختر اللون:</label>
            <select class="color-select">
                <option value="أزرق">أزرق</option>
                <option value="أحمر">أحمر</option>
                <option value="أسود">أسود</option>
            </select>
            <button onclick="order('Ghost Bookmark', this)">اطلب عبر واتساب</button>
        </div>

        <div class="product-card">
            <img src="knife.jpg" alt="3D Knife">
            <h3>3D Knife</h3>
            <div class="price">15 شيكل</div>
            <label>اختر اللون:</label>
            <select class="color-select">
                <option value="أزرق">أزرق</option>
                <option value="أحمر">أحمر</option>
                <option value="أسود">أسود</option>
            </select>
            <button onclick="order('Knife', this)">اطلب عبر واتساب</button>
        </div>

        <div class="product-card">
            <img src="lizard.jpg" alt="Lizard">
            <h3>Lizard</h3>
            <div class="price">20 شيكل</div>
            <label>اختر اللون:</label>
            <select class="color-select">
                <option value="أزرق">أزرق</option>
                <option value="أحمر">أحمر</option>
                <option value="أسود">أسود</option>
            </select>
            <button onclick="order('Lizard', this)">اطلب عبر واتساب</button>
        </div>

        <div class="product-card">
            <img src="phone-holder.jpg" alt="Phone Holder">
            <h3>Phone Holder</h3>
            <div class="price">15 شيكل</div>
            <label>اختر اللون:</label>
            <select class="color-select">
                <option value="أزرق">أزرق</option>
                <option value="أحمر">أحمر</option>
                <option value="أسود">أسود</option>
            </select>
            <button onclick="order('Phone Holder', this)">اطلب عبر واتساب</button>
        </div>

        <div class="product-card">
            <img src="whistle.jpg" alt="Whistle">
            <h3>Whistle</h3>
            <div class="price">8 شيكل</div>
            <label>اختر اللون:</label>
            <select class="color-select">
                <option value="أزرق">أزرق</option>
                <option value="أحمر">أحمر</option>
                <option value="أسود">أسود</option>
            </select>
            <button onclick="order('Whistle', this)">اطلب عبر واتساب</button>
        </div>

    </div>

    <script>
        function order(productName, button) {
            const color = button.parentElement.querySelector('.color-select').value;
            const phoneNumber = "972509099321"; 
            const text = `مرحباً Lop Side، أريد طلب: ${productName} باللون ${color}`;
            const url = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(text)}`;
            window.open(url, '_blank');
        }
    </script>

</body>
</html>
